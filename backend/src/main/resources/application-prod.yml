spring:
  datasource:
    url: ${MYSQL_URL}
    username: ${MYSQL_USERNAME}
    password: ${MYSQL_PASSWORD}
    hikari:
      maximum-pool-size: ${MYSQL_POOL_MAX:48}
      minimum-idle: ${MYSQL_POOL_MIN:8}
      connection-timeout: ${MYSQL_CONNECTION_TIMEOUT_MS:3000}
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
      timeout: ${REDIS_TIMEOUT_MS:800ms}
      connect-timeout: ${REDIS_CONNECT_TIMEOUT_MS:800ms}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

jwt:
  issuer: ${JWT_ISSUER:image-social-platform}
  secret: ${JWT_SECRET}
  access-token-expire-seconds: ${JWT_EXPIRE_SECONDS:43200}

app:
  minio:
    endpoint: ${MINIO_ENDPOINT}
    access-key: ${MINIO_ACCESS_KEY}
    secret-key: ${MINIO_SECRET_KEY}
    bucket: ${MINIO_BUCKET}
    public-endpoint: ${MINIO_PUBLIC_ENDPOINT}
  kafka:
    enabled: ${APP_KAFKA_ENABLED:true}
  elasticsearch:
    enabled: ${ELASTICSEARCH_ENABLED:false}
    endpoint: ${ELASTICSEARCH_ENDPOINT}
  recommendation:
    deep-rank:
      enabled: ${DEEP_RANK_ENABLED:true}
      endpoint: ${DEEP_RANK_ENDPOINT}
      recall-endpoint: ${DEEP_RECALL_ENDPOINT}
      timeout-ms: ${DEEP_RANK_TIMEOUT_MS:800}
      auth-token: ${DEEP_RANK_AUTH_TOKEN:}
    feed-quota:
      guard-enabled: ${RECO_FEED_QUOTA_GUARD_ENABLED:true}
