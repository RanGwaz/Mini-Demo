      changes:
        - createTable:
            tableName: user_oauth
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: provider
                  type: VARCHAR(32)
                  constraints:
                    nullable: false
              - column:
                  name: open_id
                  type: VARCHAR(128)
                  constraints:
                    nullable: false
              - column:
                  name: union_id
                  type: VARCHAR(128)
                  constraints:
                    nullable: true
              - column:
                  name: access_token
                  type: VARCHAR(512)
                  constraints:
                    nullable: true
              - column:
                  name: expires_at
                  type: DATETIME
                  constraints:
                    nullable: true
              - column:
                  name: raw_info
                  type: TEXT
                  constraints:
                    nullable: true
              - column:
                  name: deleted
                  type: TINYINT(1)
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: version
                  type: INT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: DATETIME
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: DATETIME
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - createIndex:
            tableName: user_oauth
            indexName: uk_oauth_provider_openid
            unique: true
            columns:
              - column:
                  name: provider
              - column:
                  name: open_id
        - createIndex:
            tableName: user_oauth
            indexName: idx_oauth_user_id
            columns:
              - column:
                  name: user_id

