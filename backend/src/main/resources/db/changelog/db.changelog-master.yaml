databaseChangeLog:
  - changeSet:
      id: 001-init-schema
      author: rangwaz
      validCheckSum: ANY
      preConditions:
        onFail: MARK_RAN
        not:
          indexExists:
            tableName: posts
            indexName: idx_posts_author_id
      changes:
        - sqlFile:
            path: db/migration/V1__init_schema.sql
            relativeToChangelogFile: false
            splitStatements: true
            stripComments: false

