            columns:
              - column:
                  name: parent_comment_id
                  type: BIGINT
                  constraints:
                    nullable: true
        - createIndex:
            tableName: post_comments
            indexName: idx_post_comments_parent
            columns:
              - column:
                  name: parent_comment_id

