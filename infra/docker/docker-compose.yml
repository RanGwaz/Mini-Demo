services:
  mysql:
    image: mysql:8.0.39
    container_name: image-social-mysql
    profiles: ["core"]
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: image_social
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - ./data/mysql:/var/lib/mysql
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_general_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot123456"]
      interval: 10s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: image-social-redis
    profiles: ["core"]
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:latest
    container_name: image-social-minio
    profiles: ["core", "feature"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./data/minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 20

  minio-init:
    image: minio/mc:latest
    container_name: image-social-minio-init
    profiles: ["core", "feature"]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/image-social-dev &&
      mc anonymous set public local/image-social-dev
      "

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.3
    container_name: image-social-elasticsearch
    profiles: ["search"]
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms384m -Xmx384m
    ports:
      - "9200:9200"
    volumes:
      - ./data/elasticsearch:/usr/share/elasticsearch/data
    healthcheck:
      test:
        ["CMD-SHELL", "curl -fsSL http://localhost:9200 >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20

  kibana:
    image: docker.elastic.co/kibana/kibana:8.14.3
    container_name: image-social-kibana
    profiles: ["search"]
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
      XPACK_SECURITY_ENABLED: "false"
    ports:
      - "5601:5601"

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: image-social-kafka
    profiles: ["stream"]
    ports:
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://kafka:9092,CONTROLLER://kafka:9093,PLAINTEXT_HOST://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_HEAP_OPTS: -Xms256m -Xmx512m
    volumes:
      - ./data/kafka:/var/lib/kafka/data
    healthcheck:
      disable: true

  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    container_name: image-social-kafka-init
    profiles: ["stream"]
    depends_on:
      kafka:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      for i in $$(seq 1 40); do
        kafka-topics --bootstrap-server kafka:9092 --list >/dev/null 2>&1 && break;
        sleep 3;
      done &&
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic user-events --partitions 3 --replication-factor 1 &&
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic search-sync --partitions 3 --replication-factor 1
      "

  milvus:
    image: milvusdb/milvus:v2.4.6
    container_name: image-social-milvus
    profiles: ["feature"]
    command: milvus run standalone
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY_ID: minioadmin
      MINIO_SECRET_ACCESS_KEY: minioadmin
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - ./data/milvus:/var/lib/milvus
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    # 内存限制：Milvus standalone 最低需要 ~2GB，建议 4GB
    deploy:
      resources:
        limits:
          memory: 4g
        reservations:
          memory: 2g
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 15s
      timeout: 10s
      retries: 30
      start_period: 60s

  attu:
    image: zilliz/attu:latest
    container_name: image-social-attu
    profiles: ["feature"]
    ports:
      - "8000:3000"
    depends_on:
      milvus:
        condition: service_healthy

  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: image-social-etcd
    profiles: ["feature"]
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    ports:
      - "2379:2379"
    volumes:
      - ./data/etcd:/etcd
    # 关键修复：advertise-client-urls 必须用容器内可路由地址（0.0.0.0 或容器名）
    # 用 127.0.0.1 会导致 Milvus 连接 etcd 失败，容器秒退
    command: >
      etcd
      --data-dir=/etcd
      --listen-client-urls=http://0.0.0.0:2379
      --advertise-client-urls=http://etcd:2379
      --listen-peer-urls=http://0.0.0.0:2380
      --initial-advertise-peer-urls=http://etcd:2380
      --initial-cluster=default=http://etcd:2380
      --initial-cluster-token=etcd-cluster
      --initial-cluster-state=new
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 20

  deep-rank-service:
    build:
      context: ./deep-rank-service
      dockerfile: Dockerfile
    container_name: image-social-deep-rank-service
    profiles: ["feature"]
    ports:
      - "18080:18080"
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: root123456
      MYSQL_DATABASE: image_social
      MILVUS_HOST: milvus
      MILVUS_PORT: 19530
      MILVUS_COLLECTION: post_embeddings
      RANK_MODEL_PATH: /models/deep_rank.pt
      MAX_USER_HISTORY: 50
    volumes:
      - ./models:/models
    depends_on:
      mysql:
        condition: service_healthy
      milvus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:18080/healthz')"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 20s
